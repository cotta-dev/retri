version: 2

project_name: retri

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

checksum:
  disable: true

nfpms:
  - id: packages
    package_name: retri
    vendor: cotta-dev
    homepage: "https://github.com/cotta-dev/retri"
    maintainer: "cotta-dev"
    description: "Universal SSH Log Collector & Command Executor"
    license: "MIT"
    formats:
      - deb
    file_name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- if eq .Arch "amd64" }}amd64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
