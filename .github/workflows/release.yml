name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  # 1. Production release (triggered by tag push)
  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Build with GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release (deb only)
        run: |
          gh release create "${{ github.ref_name }}" dist/*.deb \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. Development build (manual trigger)
  manual-build:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run GoReleaser (Snapshot)
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Artifact Base Name
        id: artifact-name
        run: |
          DATE=$(date -u +'%Y%m%d-%H%M')
          echo "base=retri_dev_${{ github.actor }}_${DATE}" >> $GITHUB_OUTPUT

      - name: Upload amd64
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact-name.outputs.base }}_amd64
          path: dist/*_amd64.deb
          retention-days: 3

      - name: Upload arm64
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact-name.outputs.base }}_arm64
          path: dist/*_arm64.deb
          retention-days: 3
